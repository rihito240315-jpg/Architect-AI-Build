<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT-AI // TERMINAL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="matrix-overlay"><canvas id="matrix-canvas"></canvas></div>
    <div id="auth-flash"></div>
    <div id="mode-badge" class="limited">LIMITED ACCESS</div>

    <header class="header">
        <div class="header-left">
            <span class="logo-bracket">[</span>
            <span class="logo-text">ARCHITECT-AI</span>
            <span class="logo-bracket">]</span>
            <span class="logo-version">v1.0.0-PROD</span>
        </div>
        <div class="header-right">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-display" class="status-text">SYSTEM READY</span>
        </div>
    </header>

    <!-- キュー待機バナー -->
    <div id="queue-banner">
        <div class="queue-inner">
            <i class="fas fa-hourglass-half queue-icon"></i>
            <span id="queue-message">待機中...</span>
        </div>
        <div id="queue-progress-track">
            <div id="queue-progress-bar"></div>
        </div>
    </div>

    <div class="layout">
        <div class="col-left">
            <section class="panel">
                <div class="panel-label"><span>CONFIGURATION</span><i class="fas fa-sliders"></i></div>
                <div class="field-group">
                    <label class="field-label">TARGET BUDGET <span class="field-unit">(JPY)</span></label>
                    <input type="number" id="budget" class="field-input" value="200000">
                </div>
                <div class="field-group">
                    <label class="field-label">OPERATIONAL REQUIREMENTS</label>
                    <textarea id="purpose" class="field-input" style="height: 60px; resize: none;">4K動画編集とゲームの両立。</textarea>
                </div>
                <button id="start-btn" class="btn btn-primary" onclick="startBuild()">
                    <i class="fas fa-play btn-icon"></i> 演算開始
                </button>
            </section>

            <section class="panel">
                <div class="panel-label"><span>INTERRUPT COMMAND</span><i class="fas fa-terminal"></i></div>
                <div class="cmd-row">
                    <span class="prompt-prefix">></span>
                    <input type="text" id="cmd-input" class="cmd-input" placeholder="Override code..." autocomplete="off">
                    <button class="btn btn-send" onclick="sendInstruction()">SEND</button>
                </div>
            </section>

            <section class="panel total-panel">
                <div class="panel-label">ESTIMATED TOTAL</div>
                <div class="total-display">
                    <span id="current-total" class="total-amount">¥0</span>
                    <span class="total-label">/ JPY</span>
                </div>
                <div class="scanline-bar"></div>
            </section>
        </div>

        <div class="col-right">
            <section class="panel cards-panel">
                <div class="panel-label">
                    <span>REVEALED COMPONENTS</span>
                    <span>ITERATION: <span id="loop-count" style="color:var(--accent)">0</span></span>
                </div>
                <div id="cards-container" class="cards-container">
                    <div class="cards-empty">AWAITING CALCULATION...</div>
                </div>
            </section>

            <section class="panel log-panel">
                <div class="panel-label">
                    <span>SYSTEM LOG</span>
                    <span class="log-clear" onclick="document.getElementById('log-window').innerHTML=''">CLEAR</span>
                </div>
                <div id="log-window" class="log-window"></div>
            </section>
        </div>
    </div>

    <div id="debug-panel" class="debug-panel" style="display: none;">
        <div class="debug-header">
            <span><i class="fas fa-shield-halved"></i> ADMIN OVERRIDE</span>
            <span id="admin-status">UNAUTHORIZED</span>
        </div>
        <button id="stop-btn" class="btn btn-danger" style="width:100%" onclick="triggerEmergencyStop()" disabled>
            <i class="fas fa-burst"></i> EMERGENCY STOP
        </button>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
